# lazygit theme: GitHub Dark Colorblind
# Palette: GitHub's official colorblind-safe dark theme.
# Merge this via LG_CONFIG_FILE (see ~/.config/nushell/config.nu). Diff add/remove
# colors come from the terminal's ANSI palette, not this file.
# note: red-green colorblind-safe (green -> blue, red -> orange); use alongside
#       the colorblind terminal theme so diff add reads distinct from delete.
gui:
  theme:
    activeBorderColor:
      - "#79c0ff"
      - bold
    inactiveBorderColor:
      - "#8b949e"
    searchingActiveBorderColor:
      - "#d29922"
      - bold
    optionsTextColor:
      - "#79c0ff"
    selectedLineBgColor:
      - "#161b22"
    inactiveViewSelectedLineBgColor:
      - bold
    cherryPickedCommitBgColor:
      - "#39c5cf"
    cherryPickedCommitFgColor:
      - "#ffffff"
    markedBaseCommitBgColor:
      - "#d29922"
    markedBaseCommitFgColor:
      - "#0d1117"
    unstagedChangesColor:
      - "#ec8e2c"
    defaultFgColor:
      - default
