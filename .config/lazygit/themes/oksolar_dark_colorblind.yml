# lazygit theme: OKSolar Dark Colorblind
# upstream: https://meat.io/oksolar · https://github.com/dieghernan/oksolar-theme
# Merge this via LG_CONFIG_FILE (see ~/.config/nushell/config.nu). Diff add/remove
# colors come from the terminal's ANSI palette, not this file.
# note: red-green colorblind-safe (yellow -> gold); use alongside the
#       colorblind terminal theme so diff add reads distinct from delete.
gui:
  theme:
    activeBorderColor:
      - "#2B90D8"
      - bold
    inactiveBorderColor:
      - "#5B7279"
    searchingActiveBorderColor:
      - "#C79A26"
      - bold
    optionsTextColor:
      - "#2B90D8"
    selectedLineBgColor:
      - "#093946"
    inactiveViewSelectedLineBgColor:
      - bold
    cherryPickedCommitBgColor:
      - "#259D94"
    cherryPickedCommitFgColor:
      - "#FBF7EF"
    markedBaseCommitBgColor:
      - "#C79A26"
    markedBaseCommitFgColor:
      - "#002D38"
    unstagedChangesColor:
      - "#F23749"
    defaultFgColor:
      - default
