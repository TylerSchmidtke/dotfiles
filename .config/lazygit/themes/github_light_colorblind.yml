# lazygit theme: GitHub Light Colorblind
# Palette: GitHub's official colorblind-safe light theme.
# Merge this via LG_CONFIG_FILE (see ~/.config/nushell/config.nu). Diff add/remove
# colors come from the terminal's ANSI palette, not this file.
# note: red-green colorblind-safe (green -> blue, red -> orange); use alongside
#       the colorblind terminal theme so diff add reads distinct from delete.
gui:
  theme:
    activeBorderColor:
      - "#0550ae"
      - bold
    inactiveBorderColor:
      - "#57606a"
    searchingActiveBorderColor:
      - "#9a6700"
      - bold
    optionsTextColor:
      - "#0550ae"
    selectedLineBgColor:
      - "#f6f8fa"
    inactiveViewSelectedLineBgColor:
      - bold
    cherryPickedCommitBgColor:
      - "#1b7c83"
    cherryPickedCommitFgColor:
      - "#ffffff"
    markedBaseCommitBgColor:
      - "#9a6700"
    markedBaseCommitFgColor:
      - "#0d1117"
    unstagedChangesColor:
      - "#b35900"
    defaultFgColor:
      - default
