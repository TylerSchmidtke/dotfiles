theme = "oksolar_dark"

[editor]
bufferline = "multiple"
color-modes = true
cursorline = true
true-color = true
line-number = "relative"

[editor.lsp]
display-messages = true            # show LSP status/progress in the statusline
display-inlay-hints = true         # rust-analyzer / gopls inlay hints
display-signature-help-docs = true
snippets = true

[editor.indent-guides]
render = true

[editor.statusline]
left = [
  "mode",
  "spinner",
  "file-name",
  "read-only-indicator",
  "file-modification-indicator",
]
right = ["diagnostics", "selections", "position", "file-type"]

[editor.soft-wrap]
enable = true

[keys.normal.space]
e = [
  ':sh rm -f /tmp/unique-file-h21a434',
  ':insert-output yazi "%{buffer_name}" --chooser-file=/tmp/unique-file-h21a434',
  ':sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ':open %sh{cat /tmp/unique-file-h21a434}',
  ':redraw',
]
m = [
  ':write',
  ':insert-output mdterm --theme "$(cat "$HOME/.cache/helix/current-theme" 2>/dev/null || sed -n "s/^theme *= *\"\(.*\)\"/\1/p" "$HOME/.config/helix/config.toml" | head -n1)" "$(echo "%{buffer_name}" | sed "s|^~|$HOME|")" >/dev/tty',
  ':redraw',
]

[keys.normal.space.t]
l = [':theme oksolar_light', ':sh echo oksolar_light > "$HOME/.cache/helix/current-theme"']
d = [':theme oksolar_dark', ':sh echo oksolar_dark > "$HOME/.cache/helix/current-theme"']
L = [':theme oksolar_light_colorblind', ':sh echo oksolar_light_colorblind > "$HOME/.cache/helix/current-theme"']
D = [':theme oksolar_dark_colorblind', ':sh echo oksolar_dark_colorblind > "$HOME/.cache/helix/current-theme"']
s = [':theme oksolar_sky', ':sh echo oksolar_sky > "$HOME/.cache/helix/current-theme"']

[keys.normal]
C-g = [
  ":write-all",
  ':insert-output cd "$(dirname "$(echo "%{buffer_name}" | sed "s|^~|$HOME|")")" && lazygit >/dev/tty',
  ":redraw",
  ":reload-all",
]
