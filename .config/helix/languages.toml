# Language server + debugger configuration for Rust, Go, C#, and GDScript.
#
# Most server/adapter names below (rust-analyzer, gopls, dlv, csharp-ls,
# netcoredbg, lldb-dap) are Helix built-ins — this file mainly pins choices,
# tweaks settings, and adds the Godot LSP bridge.
#
# Verify any language with:  hx --health <rust|go|c-sharp|gdscript>

# LSP: Harper for Grammar
[language-server.harper-ls]
command = "harper-ls"
args = ["--stdio"]

# harper-ls requires the settings blob to be an object with a nested
# "harper-ls" key (see harper-ls/src/config.rs Config::from_lsp_config) —
# without this Helix sends `null`/`{}` and harper-ls bails continuously,
# spamming the log and triggering redraws that raced with other TUI output.
[language-server.harper-ls.config]
"harper-ls" = {}

# ─────────────────────────────  Rust  ─────────────────────────────
# LSP: rust-analyzer  •  Debugger: lldb-dap  (both Helix defaults)
[language-server.rust-analyzer.config]
cargo.features = "all"
check.command = "clippy" # on-save diagnostics via clippy

[[language]]
name = "rust"
auto-format = true # rustfmt on save

# ──────────────────────────────  Go  ──────────────────────────────
# LSP: gopls  •  Debugger: dlv  (both Helix defaults)
[language-server.gopls.config]
gofumpt = true

[language-server.gopls.config.hints]
assignVariableTypes = true
compositeLiteralFields = true
constantValues = true
functionTypeParameters = true
parameterNames = true
rangeVariableTypes = true

[[language]]
name = "go"
auto-format = true # gofmt/gofumpt on save

# ──────────────────────────────  C#  ──────────────────────────────
[[language]]
name = "c-sharp"
language-servers = ["csharp-ls"]
auto-format = true

# ──────────────────────────  GDScript / Godot  ────────────────────
# Helix has no native TCP LSP support, so bridge stdio <-> Godot's language
# server (running inside the editor at 127.0.0.1:6005) with socat.
#
# NOTE: the Godot editor must be OPEN with the project loaded, otherwise the
# server on 6005 isn't listening and Helix will report the LSP as failed.
[language-server.godot]
command = "socat"
args = ["STDIO", "TCP:127.0.0.1:6005"]

[[language]]
name = "gdscript"
language-servers = ["godot"]
# Optional formatter (needs gdtoolkit: `pipx install gdtoolkit`):
# formatter = { command = "gdformat", args = ["-"] }
# auto-format = true

# DAP: Godot's editor exposes its own debug adapter at 127.0.0.1:6006
# whenever a project is open (Editor Settings > Network > Debug Adapter).
# Same "attach only" model as the LSP bridge above — nothing to spawn, Helix
# just connects — so the editor must already be open with the project
# loaded. Start a session with:
#   :debug-remote 127.0.0.1:6006 launch      (alias: :dbg-tcp)
# This plays the project's main scene, same as nvim-dap's "Launch scene"
# config. `project` is deliberately omitted from args: Godot only uses it to
# validate against the already-open project's path, and a relative path here
# would resolve against the Godot editor's cwd, not Helix's.
[language.debugger]
name = "godot"
transport = "tcp"

[[language.debugger.templates]]
name = "launch"
request = "launch"
args = {}

# ────────────────────────────  Python  ────────────────────────────
# Astral toolchain: ruff (lint + format) + ty (type checker / navigation).
# Both are Helix built-ins; installed as uv tools in ~/.local/bin.
[[language]]
name = "python"
language-servers = ["ty", "ruff"] # ty: types/hover/goto • ruff: lint + format
auto-format = true                # `ruff format` on save

# ──────────────────────────────  Bash  ────────────────────────────
# LSP: bash-language-server (npm)  •  Formatter: shfmt
[[language]]
name = "bash"
auto-format = true
formatter = { command = "shfmt", args = ["-i", "2", "-"] }

# ──────────────────────────────  TOML  ────────────────────────────
# LSP + formatter: taplo (built-in)
[[language]]
name = "toml"
auto-format = true

# ──────────────────────────────  JSON  ────────────────────────────
# LSP + formatter: vscode-json-language-server (npm)
[[language]]
name = "json"
auto-format = true

# ──────────────────────────────  YAML  ────────────────────────────
# LSP: yaml-language-server (npm). Auto-format left off (reflows can be noisy);
# format on demand with `:format`. Uncomment to enable on save.
# [[language]]
# name = "yaml"
# auto-format = true

[[language]]
name = "markdown"
language-servers = ["marksman", "markdown-oxide", "harper-ls"]
