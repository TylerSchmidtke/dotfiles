# GitHub Dark Colorblind for Helix
# Palette: GitHub's official colorblind-safe dark theme
# (https://github.com/primer/github-vscode-theme)
# note: red-green (deutan/protan) colorblind-safe — "green" success/add roles
# are mapped onto the same blue used for syntax accents; red shifts to orange.

# --- syntax ---
"comment" = { fg = "dim", modifiers = ["italic"] }
"comment.block.documentation" = { fg = "dim", modifiers = ["italic"] }

"keyword" = { fg = "red" }
"keyword.control" = { fg = "red" }
"keyword.control.conditional" = { fg = "red" }
"keyword.control.repeat" = { fg = "red" }
"keyword.control.return" = { fg = "red" }
"keyword.control.exception" = { fg = "red" }
"keyword.control.import" = { fg = "orange" }
"keyword.operator" = { fg = "red" }
"keyword.directive" = { fg = "orange" }
"keyword.function" = { fg = "red" }
"keyword.storage" = { fg = "yellow" }
"keyword.storage.type" = { fg = "yellow" }
"keyword.storage.modifier" = { fg = "red" }

"function" = { fg = "violet" }
"function.builtin" = { fg = "violet", modifiers = ["bold"] }
"function.method" = { fg = "violet" }
"function.macro" = { fg = "orange" }
"function.special" = { fg = "orange" }
"constructor" = { fg = "orange" }

"type" = { fg = "orange" }
"type.builtin" = { fg = "orange" }
"type.parameter" = { fg = "orange" }
"type.enum.variant" = { fg = "magenta" }

"string" = { fg = "string" }
"string.regexp" = { fg = "blue" }
"string.special" = { fg = "red" }
"string.special.url" = { fg = "string", modifiers = ["underlined"] }

"constant" = { fg = "blue" }
"constant.builtin" = { fg = "blue" }
"constant.numeric" = { fg = "magenta" }
"constant.character" = { fg = "string" }
"constant.character.escape" = { fg = "red", modifiers = ["bold"] }

"variable" = { fg = "fg0" }
"variable.builtin" = { fg = "red" }
"variable.parameter" = { fg = "fg1" }
"variable.other.member" = { fg = "blue" }

"label" = { fg = "blue" }
"namespace" = { fg = "orange" }
"module" = { fg = "orange" }
"attribute" = { fg = "blue" }
"tag" = { fg = "blue" }
"tag.builtin" = { fg = "blue" }
"special" = { fg = "red" }

"operator" = { fg = "red" }
"punctuation" = { fg = "fg1" }
"punctuation.delimiter" = { fg = "fg1" }
"punctuation.bracket" = { fg = "fg1" }
"punctuation.special" = { fg = "red" }

# --- markup ---
"markup.heading" = { fg = "blue", modifiers = ["bold"] }
"markup.heading.marker" = { fg = "dim" }
"markup.list" = { fg = "red" }
"markup.bold" = { modifiers = ["bold"] }
"markup.italic" = { modifiers = ["italic"] }
"markup.strikethrough" = { modifiers = ["crossed_out"] }
"markup.link" = { fg = "violet" }
"markup.link.url" = { fg = "string", modifiers = ["underlined"] }
"markup.link.text" = { fg = "violet" }
"markup.link.label" = { fg = "violet" }
"markup.quote" = { fg = "dim", modifiers = ["italic"] }
"markup.raw" = { fg = "string" }

# --- diff ---
"diff.plus" = { fg = "green" }
"diff.minus" = { fg = "red" }
"diff.delta" = { fg = "yellow" }

# --- diagnostics ---
"warning" = { fg = "yellow" }
"error" = { fg = "red" }
"info" = { fg = "blue" }
"hint" = { fg = "cyan" }
"diagnostic.warning" = { underline = { style = "curl", color = "yellow" } }
"diagnostic.error" = { underline = { style = "curl", color = "red" } }
"diagnostic.info" = { underline = { style = "curl", color = "blue" } }
"diagnostic.hint" = { underline = { style = "curl", color = "cyan" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }
"diagnostic.deprecated" = { modifiers = ["crossed_out"] }

# --- ui ---
"ui.background" = { bg = "bg0" }
"ui.text" = { fg = "fg0" }
"ui.text.focus" = { fg = "blue", modifiers = ["bold"] }
"ui.text.inactive" = { fg = "dim" }

"ui.cursor" = { fg = "bg0", bg = "fg1" }
"ui.cursor.primary" = { fg = "bg0", bg = "fg0" }
"ui.cursor.match" = { fg = "bg0", bg = "blue" }
"ui.cursor.insert" = { fg = "bg0", bg = "fg0" }
"ui.cursor.select" = { fg = "bg0", bg = "blue" }

"ui.cursorline.primary" = { bg = "bg1" }
"ui.cursorline.secondary" = { bg = "bg1" }
"ui.cursorcolumn.primary" = { bg = "bg1" }

"ui.selection" = { bg = "bg2" }
"ui.selection.primary" = { bg = "bg2" }

"ui.linenr" = { fg = "dim" }
"ui.linenr.selected" = { fg = "blue", modifiers = ["bold"] }
"ui.gutter" = { bg = "bg0" }

"ui.statusline" = { fg = "fg1", bg = "bg1" }
"ui.statusline.inactive" = { fg = "dim", bg = "bg1" }
"ui.statusline.normal" = { fg = "bg0", bg = "blue", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "bg0", bg = "green", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "bg0", bg = "magenta", modifiers = ["bold"] }
"ui.statusline.separator" = { fg = "bg2" }

"ui.popup" = { fg = "fg0", bg = "bg1" }
"ui.popup.info" = { fg = "fg0", bg = "bg1" }
"ui.window" = { fg = "bg2" }
"ui.help" = { fg = "fg0", bg = "bg1" }

"ui.menu" = { fg = "fg0", bg = "bg1" }
"ui.menu.selected" = { fg = "fg1", bg = "bg2", modifiers = ["bold"] }
"ui.menu.scroll" = { fg = "fg0", bg = "bg2" }

"ui.virtual.ruler" = { bg = "bg1" }
"ui.virtual.whitespace" = { fg = "bg2" }
"ui.virtual.indent-guide" = { fg = "bg1" }
"ui.virtual.inlay-hint" = { fg = "dim", modifiers = ["italic"] }
"ui.virtual.jump-label" = { fg = "blue", modifiers = ["bold"] }
"ui.virtual.wrap" = { fg = "bg2" }

"ui.bufferline" = { fg = "dim", bg = "bg1" }
"ui.bufferline.active" = { fg = "fg1", bg = "bg0", modifiers = ["bold"] }

[palette]
bg0 = "#0d1117"
bg1 = "#161b22"
bg2 = "#30363d"
dim = "#8b949e"
fg0 = "#c9d1d9"
fg1 = "#b1bac4"
red = "#ec8e2c"
orange = "#fdac54"
yellow = "#d29922"
green = "#58a6ff"
cyan = "#39c5cf"
blue = "#79c0ff"
violet = "#d2a8ff"
magenta = "#bc8cff"
string = "#a5d6ff"
